<ul class="todo-list">
  @for (todo of todos; track trackByTodoId($index, todo)) {
    <li class="todo-list_item">
      <label>
        <input type="checkbox" [checked]="todo.completed" disabled />
        <span [class.completed]="todo.completed">
          {{ todo.title }}
        </span>
      </label>
    </li>
  } @empty {
    <li class="todo-list_empty">No todos yet.</li>
  }
</ul>
