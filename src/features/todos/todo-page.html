<section class="todo-page">
  <header class="todo-page__header">
    <h1>Todo List</h1>
    <p class="todo-page__subtitle">
      A simple Angular todo app
    </p>
  </header>

  <section class="todo-page__summary">
    <div class="summary-card">
      <span class="summary-card__label">Total</span>
      <strong class="summary-card__value">{{ totalCount() }}</strong>
    </div>

    <div class="summary-card">
      <span class="summary-card__label">Completed</span>
      <strong class="summary-card__value">{{ completedCount() }}</strong>
    </div>

    <div class="summary-card">
      <span class="summary-card__label">Remaining</span>
      <strong class="summary-card__value">{{ remainingCount() }}</strong>
    </div>
  </section>

  <section class="todo-page__panel">
    <div class="todo-page__panel-header">
      <h2>Add a Todo</h2>
    </div>

    <app-todo-form (addTodo)="addTodo($event)" />

    <hr class="todo-page__divider" />

    <h2>Your Todos</h2>

    <p class="todo-page__note">
      We’ll connect the form, list, and item components next.
    </p>

    <app-todo-list [todos]="todos()"/>

  </section>
</section>
